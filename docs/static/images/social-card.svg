  <text x="250" y="457" font-family="ui-monospace, monospace" font-size="16" fill="#e57125" text-anchor="middle" letter-spacing="0.5">~100KB  ·  Zero overhead  ·  Java 8+</text>
  <!-- Pixie name -->
